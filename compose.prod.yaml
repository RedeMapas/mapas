# Docker Compose production environment for MapaCultural
# Usage: docker compose -f compose.prod.yaml up -d
# Access: http://localhost (configure reverse proxy/load balancer as needed)

services:
  mapas:
    image: ghcr.io/redemapas/mapas:v7.7.9-rc.9
    container_name: mapas-prod-mapas
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "80:80"
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: mapas
      DB_USER: mapas
      DB_PASS: ${DB_PASSWORD:-changeme}

      # Redis cache configuration (recommended for production)
      REDIS_CACHE: redis:6379

      # Sessions in filesystem (inside named volume)
      SESSIONS_SAVE_PATH: /var/www/var/sessions

      # Mailer configuration (configure for your SMTP server)
      MAILER_TRANSPORT: ${MAILER_TRANSPORT:-smtp://localhost:25}
      MAILER_FROM: ${MAILER_FROM:-noreply@mapas.example.com}

      # Application settings
      BASE_URL: ${BASE_URL:-http://localhost}
      APP_ENV: production
      APP_DEBUG: "false"
      CI: "false"

      # Build assets on first run
      BUILD_ASSETS: "1"

      # Subsites configuration
      DISABLE_SUBSITES: ${DISABLE_SUBSITES:-false}

      # Jobs and cache recreation intervals (in minutes)
      PENDING_PCACHE_RECREATION_INTERVAL: ${PCACHE_INTERVAL:-30}
      JOBS_INTERVAL: ${JOBS_INTERVAL:-15}

      # Process configuration
      NUM_PROCESSES: ${NUM_PROCESSES:-4}
      MC_UPDATES_PROCESSES: ${MC_UPDATES_PROCESSES:-2}

      # reCAPTCHA keys (configure with your own keys)
      GOOGLE_RECAPTCHA_SITEKEY: ${RECAPTCHA_SITEKEY:-}
      GOOGLE_RECAPTCHA_SECRET: ${RECAPTCHA_SECRET:-}

      # Asset redirection (optional)
      REDIRECT_404_ASSETS_TO: ${REDIRECT_404_ASSETS:-}
    volumes:
      # Runtime data (all named volumes for persistence)
      - mapas-var:/var/www/var
      - mapas-assets:/var/www/html/assets
      - mapas-files:/var/www/html/files
      - mapas-private:/var/www/var/private-files
    networks:
      - mapas-prod
    healthcheck:
      test: ["CMD", "test", "-f", "/mapas-ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    image: postgis/postgis:14-3.4
    container_name: mapas-prod-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: mapas
      POSTGRES_USER: mapas
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mapas-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mapas -d mapas"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: mapas-prod-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - mapas-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data:
    name: mapas-prod-postgres-data
  redis-data:
    name: mapas-prod-redis-data
  mapas-var:
    name: mapas-prod-var
  mapas-assets:
    name: mapas-prod-assets
  mapas-files:
    name: mapas-prod-files
  mapas-private:
    name: mapas-prod-private

networks:
  mapas-prod:
    name: mapas-prod-network
    driver: bridge
