services:
  caddy:
    image: caddy:2
    container_name: mapas-dev-caddy
    depends_on:
      mapas:
        condition: service_healthy
    ports:
      - "8443:443"
      - "8081:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - mapas-dev

volumes:
  caddy_data:
  caddy_config:
